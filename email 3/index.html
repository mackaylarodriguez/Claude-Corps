<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riverbend Volunteer Shift Signup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .banner {
      display: none;
      background: #fefcbf;
      color: #744210;
      padding: 14px 32px;
      font-size: 14px;
      border-bottom: 1px solid #f6e05e;
    }
    .banner.show { display: block; }
    .header {
      background: #2d3748;
      color: white;
      padding: 32px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.85; font-size: 15px; line-height: 1.5; }
    .shifts { padding: 32px; }
    .shift-card {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .shift-card:hover:not(.full) { border-color: #667eea; }
    .shift-card.full { opacity: 0.65; }
    .shift-info h3 { font-size: 18px; color: #2d3748; margin-bottom: 4px; }
    .shift-info p { color: #718096; font-size: 14px; margin-bottom: 6px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: #edf2f7;
      color: #4a5568;
    }
    .tag.age { background: #ebf8ff; color: #2b6cb0; }
    .tag.full-tag { background: #fed7d7; color: #c53030; }
    .signup-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .signup-btn:hover { background: #5a67d8; }
    .signup-btn:disabled { background: #cbd5e0; cursor: not-allowed; }
    .footer-note {
      padding: 0 32px 32px;
      font-size: 13px;
      color: #718096;
      line-height: 1.6;
    }
    .footer-note a { color: #667eea; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    .modal-content h2 { font-size: 20px; margin-bottom: 4px; }
    .modal-sub { color: #718096; font-size: 14px; margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 15px;
    }
    input:focus { outline: none; border-color: #667eea; }
    input.invalid { border-color: #fc8181; }
    .field-error {
      font-size: 12px;
      color: #e53e3e;
      margin-bottom: 12px;
      min-height: 16px;
    }
    .modal-note {
      font-size: 12px;
      color: #718096;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .modal-actions { display: flex; gap: 12px; }
    .cancel-btn {
      flex: 1;
      background: #edf2f7;
      color: #4a5568;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    .toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: white;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 90%;
      z-index: 100;
    }
    .toast.show { display: block; }
    @media (max-width: 600px) {
      .shift-card { flex-direction: column; align-items: stretch; }
      .signup-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="banner" id="banner" role="alert"></div>
    <div class="header">
      <h1 id="org-name"></h1>
      <p id="org-tagline"></p>
    </div>
    <div class="shifts" id="shifts" aria-live="polite"></div>
    <div class="footer-note" id="footer-note"></div>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <h2 id="modal-title">Sign up for <span id="modal-shift"></span></h2>
      <p class="modal-sub" id="modal-location"></p>
      <form id="signup-form" novalidate>
        <label for="name">Name</label>
        <input type="text" id="name" autocomplete="name" required>
        <div class="field-error" id="name-error"></div>

        <label for="email">Email <span style="font-weight:400;color:#a0aec0">(optional)</span></label>
        <input type="email" id="email" autocomplete="email">
        <div class="field-error" id="email-error"></div>

        <label for="phone">Mobile phone</label>
        <input type="tel" id="phone" autocomplete="tel" required>
        <div class="field-error" id="phone-error"></div>

        <p class="modal-note" id="modal-note"></p>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancel-btn">Cancel</button>
          <button type="submit" class="signup-btn" id="confirm-btn">Confirm</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    // ── Edit this block when shifts or org info change ──
    const CONFIG = {
      orgName: "Riverbend Volunteer Shifts",
      tagline: "Pick a shift below — we'll text you a reminder the day before.",
      footerNote: "First-time volunteers sign a waiver on arrival. School or group signups (5+): email <a href=\"mailto:volunteers@riverbendfood.org\">volunteers@riverbendfood.org</a>.",
      webhookUrl: "",  // Apps Script URL when wired up — leave empty for prototype
      banner: null,    // e.g. { message: "Saturday shifts cancelled due to weather." }
      ageRules: {
        "mobile-pantry": { label: "18+ only", confirm: "Mobile pantry shifts are 18+ only. Confirm you meet this requirement?" },
        "warehouse-sort": { label: "14+ with consent · 16+ solo" },
        "drop-off": { label: "16+ solo" },
      },
      shifts: [
        { id: 1, day: "Tuesday", time: "9am – 12pm", location: "Warehouse sort", type: "warehouse-sort", need: 8, taken: 3 },
        { id: 2, day: "Tuesday", time: "1pm – 4pm", location: "Warehouse sort", type: "warehouse-sort", need: 6, taken: 6 },
        { id: 3, day: "Thursday", time: "9am – 12pm", location: "Warehouse sort", type: "warehouse-sort", need: 8, taken: 1 },
        { id: 4, day: "Saturday", time: "8am – 11am", location: "Mobile pantry — Ellis", type: "mobile-pantry", need: 12, taken: 5 },
        { id: 5, day: "Saturday", time: "9am – 1pm", location: "Warehouse public drop-off", type: "drop-off", need: 4, taken: 2 },
      ],
    };

    let selectedShift = null;

    function init() {
      document.getElementById("org-name").textContent = CONFIG.orgName;
      document.getElementById("org-tagline").textContent = CONFIG.tagline;
      document.getElementById("footer-note").innerHTML = CONFIG.footerNote;
      if (CONFIG.banner?.message) {
        const b = document.getElementById("banner");
        b.textContent = CONFIG.banner.message;
        b.classList.add("show");
      }
      render();
      bindEvents();
    }

    function bindEvents() {
      document.getElementById("cancel-btn").addEventListener("click", closeModal);
      document.getElementById("signup-form").addEventListener("submit", e => { e.preventDefault(); submitSignup(); });
      document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
    }

    function render() {
      document.getElementById("shifts").innerHTML = CONFIG.shifts.map(s => {
        const open = s.need - s.taken;
        const full = open <= 0;
        const age = CONFIG.ageRules[s.type];
        return `
          <div class="shift-card${full ? " full" : ""}">
            <div class="shift-info">
              <h3>${s.day} · ${s.time}</h3>
              <p>${s.location}</p>
              <div class="tags">
                <span class="tag${full ? " full-tag" : ""}">${full ? "Full" : open + " of " + s.need + " spots open"}</span>
                ${age ? `<span class="tag age">${age.label}</span>` : ""}
              </div>
            </div>
            <button class="signup-btn" ${full ? "disabled" : ""} onclick="openModal(${s.id})" aria-label="Sign up for ${s.day} ${s.time}">
              ${full ? "Full" : "Sign up"}
            </button>
          </div>`;
      }).join("");
    }

    function openModal(id) {
      selectedShift = CONFIG.shifts.find(s => s.id === id);
      document.getElementById("modal-shift").textContent = `${selectedShift.day} ${selectedShift.time}`;
      document.getElementById("modal-location").textContent = selectedShift.location;
      document.getElementById("modal-note").textContent =
        "You'll get a reminder text the day before. Waiver signed at check-in.";
      clearErrors();
      document.getElementById("modal").classList.add("open");
      document.getElementById("name").focus();
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
      document.getElementById("signup-form").reset();
      clearErrors();
      selectedShift = null;
    }

    function clearErrors() {
      ["name", "email", "phone"].forEach(f => {
        document.getElementById(f).classList.remove("invalid");
        document.getElementById(f + "-error").textContent = "";
      });
    }

    function setError(field, msg) {
      document.getElementById(field).classList.add("invalid");
      document.getElementById(field + "-error").textContent = msg;
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 5000);
    }

    function validate() {
      clearErrors();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      let ok = true;

      if (!name) { setError("name", "Please enter your name."); ok = false; }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setError("email", "Please enter a valid email."); ok = false;
      }
      if (!phone) { setError("phone", "Phone required for reminder texts."); ok = false; }
      else if (phone.replace(/\D/g, "").length < 10) {
        setError("phone", "Please enter a 10-digit mobile number."); ok = false;
      }

      const rule = CONFIG.ageRules[selectedShift.type];
      if (ok && rule?.confirm && !confirm(rule.confirm)) ok = false;

      return ok ? { name, email, phone } : null;
    }

    async function submitSignup() {
      const data = validate();
      if (!data) return;

      const btn = document.getElementById("confirm-btn");
      btn.disabled = true;
      btn.textContent = "Signing up…";

      const payload = {
        shiftId: selectedShift.id,
        shift: `${selectedShift.day} ${selectedShift.time}`,
        location: selectedShift.location,
        ...data,
      };

      try {
        if (CONFIG.webhookUrl) {
          const res = await fetch(CONFIG.webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error("Server error");
        }
        selectedShift.taken += 1;
        closeModal();
        render();
        showToast(`Thanks ${data.name}! You're signed up for ${payload.shift}.`);
      } catch {
        showToast("Something went wrong — please try again or email volunteers@riverbendfood.org.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Confirm";
      }
    }

    init();
  </script>
</body>
</html>
